<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient History - Pneumonia Detection</title>
    <style>
        * {
             margin: 0; 
             padding: 0; 
             box-sizing: 
             border-box; 
            }
        body { 
            font-family: Arial, sans-serif; 
            line-height: 1.6; 
            color: #333; 
            background: #fff; 
        }

        header { 
            background-color: #2c3e50; 
            color: white; 
            padding: 1rem 0; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
        nav { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 1rem; 
            display:flex; 
            justify-content:space-between; 
            align-items:center 
        }
        
        nav h1 { 
            font-size: 1.8rem 
        }

        nav ul { 
            list-style:none; 
            display:flex; 
            gap:2rem 
        }
        nav a { 
            color: white; 
            text-decoration:none; 
            transition:color 0.3s 
        }
        
        nav a:hover { 
            color: #3498db 
        }

        .hero { 
            background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); 
            color:white; 
            padding:4rem 1rem; 
            text-align:center 
        }
        
        .hero-content { 
            max-width:1200px; 
            margin:0 auto 
        }

        .container { 
            max-width:1200px; 
            margin:3rem auto; 
            padding:0 1rem 
        }

        .history-grid { 
            display:grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap:30px 
        }
        
        .history-card { 
            background:white; 
            border-radius:15px; 
            overflow:hidden; 
            box-shadow:0 10px 30px rgba(0,0,0,0.12); 
            transition:transform 0.3s ease, box-shadow 0.3s ease 
        }
        
        .history-card:hover { 
            transform:translateY(-5px); 
            box-shadow:0 15px 40px rgba(0,0,0,0.16) 
        }
        
        .image-container { 
            width:100%; height:250px; 
            overflow:hidden; 
            background:#f0f0f0 
        }
        
        .image-container img { 
            width:100%; 
            height:100%; 
            object-fit:cover 
        }
        
        .card-content { 
            padding:25px 
        }
        
        .patient-name { 
            font-size:1.25rem; 
            font-weight:700; 
            color:#333; 
            margin-bottom:12px 
        }
        
        .result-item { 
            margin-bottom:12px 
        }
        
        .result-label { 
            font-size:0.8rem; 
            color:#666; 
            font-weight:600; 
            text-transform:uppercase; 
            letter-spacing:0.5px; 
            margin-bottom:6px 
        }
        
        .result-value { 
            font-size:1.05rem; 
            font-weight:700; 
            color:#333 
        }
        
        .confidence-score { 
            background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); 
            color:white; 
            padding:12px; 
            border-radius:10px; 
            text-align:center; 
            margin-top:12px 
        }
        
        .no-history { 
            text-align:center; 
            color:#666; 
            padding:40px; 
            font-size:1.1em 
        }
        
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            margin-top: 3rem;
        }
        @media (max-width:768px) { .history-grid { grid-template-columns:1fr } .hero { padding:2rem 1rem } }
    </style>
</head>
<body>
    <header>
        <nav>
            <h1>Pneumonia Detection</h1>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="upload.html">Upload Image</a></li>
                <li><a href="patientInformation.html">Patient Information</a></li>
                <li><a href="history.html">History</a></li>
                <li><a href="performance.html">Performance Measures</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h2>Patient History</h2>
            <p>Detection Results Overview</p>
        </div>
    </section>

    <div class="container">
        <div class="history-grid" id="historyContainer">
        </div>
    </div>

     <footer>
        <p>&copy; 2026 ColorVision </p>
    </footer>
    <script>
        let patients = [];
        try { patients = JSON.parse(localStorage.getItem('patients') || '[]'); } catch(e) { patients = []; }

        const historyData = (patients || []).map(p => ({
            patientName: p.name || '-',
            result: p.prediction || '-',
            confidenceScore: p.confidence || 0,
            imageUrl: p.image || '',
            uploadDate: p.uploadDate || ''
        }));

        function loadHistory() {
            const container = document.getElementById('historyContainer');
            if (!historyData || historyData.length === 0) {
                container.innerHTML = '<div class="no-history">No patient history available</div>';
                return;
            }

            container.innerHTML = historyData.map(record => `
                <div class="history-card">
                    <div class="image-container">
                        <img src="${record.imageUrl || 'https://via.placeholder.com/350x250?text=No+Image'}" alt="Chest X-Ray for ${escapeHtml(record.patientName)}">
                    </div>
                    <div class="card-content">
                        <div class="patient-name">${escapeHtml(record.patientName)}</div>
                        <div class="result-item">
                            <div class="result-label">Result</div>
                            <div class="result-value">${escapeHtml(record.result)}</div>
                        </div>
                        <div class="confidence-score">
                            <div class="result-label">Confidence Score</div>
                            <div class="result-value">${escapeHtml(record.confidenceScore + '%')}</div>
                        </div>
                        <div style="margin-top:10px;color:#666;font-size:0.9rem">${record.uploadDate ? 'Uploaded: ' + new Date(record.uploadDate).toLocaleString() : ''}</div>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(str){ if (!str) return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }

        document.addEventListener('DOMContentLoaded', loadHistory);
    </script>
</body>
</html>
